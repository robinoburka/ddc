name: DDC Release

on:
  workflow_run:
    workflows: ["DDC CI"]
    types: [completed]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: ddc

jobs:
  validate:
    name: Validate tag and version
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      should_release: ${{ steps.validate.outputs.should_release }}
      release_tag: ${{ steps.validate.outputs.release_tag }}
      release_version: ${{ steps.validate.outputs.release_version }}
      is_prerelease: ${{ steps.validate.outputs.is_prerelease }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Validate release tag and Cargo version
        id: validate
        shell: bash
        run: |
          set -euo pipefail

          tag="$(git tag --points-at "${{ github.event.workflow_run.head_sha }}" | grep -E '^v' | head -n 1 || true)"

          if [[ -z "${tag}" ]]; then
            echo "No v* tag found on this commit; skipping release."
            echo "should_release=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ ! "${tag}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid tag format: ${tag}"
            echo "Expected: v<semver> (examples: v1.2.3, v1.2.3-rc.1)"
            exit 1
          fi

          tag_version="${tag#v}"
          cargo_version="$(awk '
            /^\[package\]/ { in_package=1; next }
            /^\[/ && $0 != "[package]" { in_package=0 }
            in_package && /^version[[:space:]]*=/ {
              gsub(/"/, "", $3)
              print $3
              exit
            }
          ' Cargo.toml)"

          if [[ -z "${cargo_version}" ]]; then
            echo "Could not read package version from Cargo.toml"
            exit 1
          fi

          if [[ "${tag_version}" != "${cargo_version}" ]]; then
            echo "Tag version (${tag_version}) does not match Cargo.toml version (${cargo_version})"
            exit 1
          fi

          if [[ "${tag_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+- ]]; then
            is_prerelease="true"
          else
            is_prerelease="false"
          fi

          echo "should_release=true" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "release_version=${tag_version}" >> "${GITHUB_OUTPUT}"
          echo "is_prerelease=${is_prerelease}" >> "${GITHUB_OUTPUT}"

  build:
    name: Build ${{ matrix.target }}
    needs: validate
    if: needs.validate.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            binary_ext: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_ext: tar.gz
            binary_ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            binary_ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            binary_ext: .exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          version="${{ needs.validate.outputs.release_version }}"
          out_dir="dist"
          mkdir -p "$out_dir"
          artifact="${BIN_NAME}-v${version}-${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "$out_dir/${BIN_NAME}"
          tar -C "$out_dir" -czf "$out_dir/${artifact}.tar.gz" "${BIN_NAME}"
          rm "$out_dir/${BIN_NAME}"
          shasum -a 256 "$out_dir/${artifact}.tar.gz" > "$out_dir/${artifact}.tar.gz.sha256"

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ needs.validate.outputs.release_version }}"
          $outDir = "dist"
          New-Item -ItemType Directory -Path $outDir -Force | Out-Null
          $artifact = "${env:BIN_NAME}-v$version-${{ matrix.target }}"
          Copy-Item "target/${{ matrix.target }}/release/${env:BIN_NAME}${{ matrix.binary_ext }}" "$outDir/${env:BIN_NAME}${{ matrix.binary_ext }}"
          $archivePath = "$outDir/$artifact.zip"
          Compress-Archive -Path "$outDir/${env:BIN_NAME}${{ matrix.binary_ext }}" -DestinationPath $archivePath -Force
          Remove-Item "$outDir/${env:BIN_NAME}${{ matrix.binary_ext }}"
          $hash = (Get-FileHash -Path $archivePath -Algorithm SHA256).Hash.ToLower()
          "$hash  $artifact.zip" | Set-Content -Path "$archivePath.sha256" -NoNewline

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/*

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, build]
    if: needs.validate.outputs.should_release == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Prepare release notes from annotated tag
        shell: bash
        run: |
          tag="${{ needs.validate.outputs.release_tag }}"
          git tag -l --format='%(contents)' "${tag}" > RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.release_tag }}
          prerelease: ${{ needs.validate.outputs.is_prerelease == 'true' }}
          body_path: RELEASE_NOTES.md
          files: dist/*
